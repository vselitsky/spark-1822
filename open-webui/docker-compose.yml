name: open-webui

services:
  ollama:
    image: ollama/ollama:${OLLAMA_TAG:?OLLAMA_TAG must be set in .env}
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_TAG:?OPEN_WEBUI_TAG must be set in .env}
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "0.0.0.0:${OPEN_WEBUI_PORT:-8080}:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY must be set in .env}
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
      DO_NOT_TRACK: "true"
      SCARF_NO_ANALYTICS: "true"
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama:
    name: open-webui-ollama
  open-webui:
    name: open-webui
