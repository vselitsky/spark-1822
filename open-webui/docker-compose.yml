name: open-webui

services:
  ollama:
    image: ollama/ollama:${OLLAMA_TAG:?OLLAMA_TAG must be set in .env}
    container_name: ollama
    restart: unless-stopped
    networks:
      - traefik
    # Traefik docker-provider labels. Inert when Caddy is the active
    # proxy (Caddy reads Caddyfile.d, not labels). When Traefik is up,
    # they wire ollama:11434 to https://ollama.spark-1822.local.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.ollama.rule=HostRegexp(`ollama.spark{x:.+}`) || HostRegexp(`spark{x:.+}`)"
      - "traefik.http.routers.ollama.entryPoints=websecure"
      - "traefik.http.routers.ollama.tls=true"
      - "traefik.http.services.ollama.loadbalancer.server.port=11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_TAG:?OPEN_WEBUI_TAG must be set in .env}
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - traefik
    # Traefik docker-provider labels. Inert when Caddy is the active
    # proxy (Caddy reads Caddyfile.d, not labels). When Traefik is up,
    # they wire open-webui:8080 to https://open-webui.spark-1822.local.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.open-webui.rule=HostRegexp(`open-webui.spark{x:.+}`) || HostRegexp(`spark{x:.+}`)"
      - "traefik.http.routers.open-webui.entryPoints=websecure"
      - "traefik.http.routers.open-webui.tls=true"
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY must be set in .env}
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
      DO_NOT_TRACK: "true"
      SCARF_NO_ANALYTICS: "true"
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Single network shared with the active proxy (traefik or caddy) and
  # every other stack — open-webui resolves `ollama` by name over it.
  traefik:
    external: true
    name: traefik

volumes:
  # Both volumes are external — host-side persistent state we don't want
  # `docker compose down -v` to ever destroy (ollama model blobs ~tens of
  # GiB; Open WebUI users/chats/config). `open-webui-ollama` is also
  # consumed read-only by the `llama-cpp/` stack to reuse Ollama's GGUF
  # blob cache.
  ollama:
    external: true
    name: open-webui-ollama
  open-webui:
    external: true
    name: open-webui
