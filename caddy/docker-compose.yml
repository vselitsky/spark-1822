name: caddy

services:
  caddy:
    image: caddy:${CADDY_TAG:?CADDY_TAG must be set in .env}
    container_name: caddy
    restart: unless-stopped
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?CADDY_DOMAIN must be set in .env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - web
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./Caddyfile.d:/etc/caddy/Caddyfile.d:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web:
    external: true
    name: web

volumes:
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config
