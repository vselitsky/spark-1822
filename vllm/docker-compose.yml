name: vllm

services:
  vllm:
    image: vllm/vllm-openai:${VLLM_TAG:?VLLM_TAG must be set in .env}
    container_name: vllm
    # `no` (not unless-stopped) — GPU is exclusive with ollama / llama-cpp.
    # Start manually with `docker compose up -d` after stopping the others.
    restart: "no"
    networks:
      - traefik
    # Loopback-only bind: Traefik reaches the container via the `traefik`
    # docker network; this port is for direct host-side curl/benchmarks,
    # not the outside world. Override HOST_PORT in .env if 8000 is taken.
    ports:
      - "127.0.0.1:${HOST_PORT:-8000}:8000"
    ipc: host                       # required for NCCL / Torch shared-memory paths
    shm_size: "8gb"
    # Traefik docker-provider labels. Wire vllm:8000 to
    # https://vllm.<any-spark-host>.<any-domain>.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.vllm.rule=HostRegexp(`vllm.{x:.+}`)"
      - "traefik.http.routers.vllm.entryPoints=websecure"
      - "traefik.http.routers.vllm.tls=true"
      - "traefik.http.services.vllm.loadbalancer.server.port=8000"
    volumes:
      # HuggingFace CLI cache, shared with the host so existing downloads are
      # reused and new ones are visible outside the container.
      - ${HF_CACHE_HOST:-/opt/hf/.cache/huggingface}:/root/.cache/huggingface
      # Launcher script builds the `vllm serve` argv from env vars.
      - ./entrypoint.sh:/usr/local/bin/vllm-entrypoint:ro
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      VLLM_USAGE_SOURCE: docker
      VLLM_MODEL: ${VLLM_MODEL:?VLLM_MODEL must be set in env file}
      VLLM_SERVED_NAME: ${VLLM_SERVED_NAME:-}
      VLLM_GPU_MEM: ${VLLM_GPU_MEM:-0.9}
      VLLM_MAX_LEN: ${VLLM_MAX_LEN:-8192}
    entrypoint: ["/usr/local/bin/vllm-entrypoint"]
    command: []
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 600s   # first run may need to download the model
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik:
    external: true
    name: traefik
