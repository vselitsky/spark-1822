name: netdata

services:
  netdata:
    image: netdata/netdata:${NETDATA_TAG:?NETDATA_TAG must be set in .env}
    container_name: netdata
    hostname: ${NETDATA_HOSTNAME:-spark-1822}
    restart: unless-stopped
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      DOCKER_HOST: /var/run/docker.sock
      PGID: ${DOCKER_GID:?DOCKER_GID must be set in .env to the host docker group GID}
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:19999/api/v1/info"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  netdata-config:
    name: netdata-config
  netdata-lib:
    name: netdata-lib
  netdata-cache:
    name: netdata-cache
