name: llama-cpp

services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:${LLAMACPP_TAG:?LLAMACPP_TAG must be set in .env}
    container_name: llama-cpp
    # `no` (not unless-stopped) — GPU is exclusive with ollama / vllm. Start
    # manually with `docker compose up -d` when you want this one active and
    # `docker compose down` the other engines first.
    restart: "no"
    networks:
      - traefik
    # Loopback-only bind: the active proxy (traefik or caddy) reaches the
    # container via the `traefik` docker network; this port is for direct
    # host-side curl/benchmarks, not the outside world. Override HOST_PORT
    # in .env if 8080 is taken.
    ports:
      - "127.0.0.1:${HOST_PORT:-8080}:8080"
    # Traefik docker-provider labels. Inert when Caddy is the active
    # proxy (Caddy reads Caddyfile.d, not labels). When Traefik is up,
    # they wire llama-cpp:8080 to https://llama.spark-1822.local.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.llama.rule=HostRegexp(`llama.spark{x:.+}`) || HostRegexp(`spark{x:.+}`)"
      - "traefik.http.routers.llama.entryPoints=websecure"
      - "traefik.http.routers.llama.tls=true"
      - "traefik.http.services.llama.loadbalancer.server.port=8080"
    volumes:
      # llama.cpp's own model cache (filled by --model-url).
      - llama-cpp-cache:/root/.cache/llama.cpp
      # Reuse models already pulled by Ollama. Read-only.
      # Blobs live at /ollama/models/blobs/sha256-<hex> (one per layer; the
      # GGUF is the layer with mediaType `application/vnd.ollama.image.model`).
      - ollama-models:/ollama:ro
      # Reuse files already downloaded by the HuggingFace CLI on the host.
      # Layout: hub/models--<org>--<repo>/snapshots/<rev>/<file>
      - ${HF_CACHE_HOST:-/opt/hf/.cache/huggingface}:/root/.cache/huggingface:ro
      # Launcher script picks MODEL_PATH, MODEL_OLLAMA, or MODEL_URL.
      - ./entrypoint.sh:/usr/local/bin/llama-cpp-entrypoint:ro
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      MODEL_PATH: ${MODEL_PATH:-}
      MODEL_URL: ${MODEL_URL:-}
      MODEL_OLLAMA: ${MODEL_OLLAMA:-}
      MODEL_ALIAS: ${MODEL_ALIAS:-llama-cpp}
      CTX_SIZE: ${CTX_SIZE:-8192}
      N_GPU_LAYERS: ${N_GPU_LAYERS:-999}
    entrypoint: ["/usr/local/bin/llama-cpp-entrypoint"]
    command: []
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 600s   # first --model-url run may need many minutes
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik:
    external: true
    name: traefik

volumes:
  llama-cpp-cache:
    name: llama-cpp-cache
  ollama-models:
    external: true
    name: open-webui-ollama
