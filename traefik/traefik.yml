# Traefik static configuration.
#
# Mirrors caddy/'s posture: HTTPS on 443 (auto-redirect from 80), file
# provider only (no Docker labels), TLS via a wildcard cert generated by
# `make wildcard-cert` from Caddy's existing root CA.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

  # Internal-only entrypoint for the /ping healthcheck. Bound to all
  # interfaces inside the container, but no host port published — only
  # the container's own healthcheck reaches it.
  ping:
    address: ":8081"

api:
  dashboard: true
  insecure: false       # don't bind the dashboard on its own port; route through https
                        # (see dynamic/services.yml — traefik.<domain>)

ping:
  entryPoint: ping

providers:
  # Primary: discover labelled services on the docker socket. Services
  # opt in with `traefik.enable=true` plus the usual router/service
  # labels. Caddy ignores those labels, so the same compose files work
  # under either proxy.
  docker:
    exposedByDefault: false
    network: caddy      # always dial upstreams over the shared caddy network
    watch: true

  # Secondary: anything that can't be label-driven — host-network
  # containers (netdata) and traefik's own dashboard route.
  file:
    directory: /etc/traefik/dynamic
    watch: true         # hot-reload on dynamic/*.yml changes

# ─── LetsEncrypt (scaffolded; activate when this host gets a public DNS) ──
# LE can't issue certs for `.local` mDNS names — it needs a publicly-
# resolvable domain. When you have one (e.g., `spark.example.com`),
# uncomment ONE of the challenge blocks below, drop in your email, and
# mount the acme volume in docker-compose.yml. Then per-route opt-in via
# a label on the relevant service:
#
#   - "traefik.http.routers.<name>.tls.certresolver=letsencrypt"
#
# Internal .local routes keep using the wildcard from dynamic/tls.yml —
# both cert sources coexist.
#
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: REPLACE@example.com
#       storage: /etc/traefik/acme/acme.json
#       # Pick ONE challenge:
#       #
#       # http-01 — needs port 80 reachable from the public internet
#       # (port forward on your router, or run on a host with a public IP):
#       httpChallenge:
#         entryPoint: web
#       #
#       # dns-01 — no inbound ports needed; required for wildcard certs.
#       # Set the provider's API token in the traefik container env (e.g.
#       # CF_DNS_API_TOKEN for Cloudflare). Full list:
#       # https://doc.traefik.io/traefik/https/acme/#providers
#       # dnsChallenge:
#       #   provider: cloudflare
#       #   delayBeforeCheck: 30s

log:
  level: INFO

accessLog:
  format: json
  filters:
    statusCodes:
      - "200-299"
      - "400-599"
