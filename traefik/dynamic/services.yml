# Routes that can't be expressed as labels on a docker-compose service.
# Everything else is discovered from container labels by the docker
# provider (see services' compose files for `traefik.http.*` labels).

http:
  routers:
    # netdata runs in network_mode: host — no container endpoint for the
    # docker provider to attach to. Route to host.docker.internal:19999.
    netdata:
      rule: "Host(`netdata.spark-1822.local`)"
      entryPoints: [websecure]
      service: netdata
      tls: {}

    # Traefik's own dashboard + API, fronted by the proxy itself.
    traefik:
      rule: "Host(`traefik.spark-1822.local`)"
      entryPoints: [websecure]
      service: api@internal
      tls: {}

  services:
    netdata:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:19999"
        passHostHeader: true
