# Routes that can't be expressed as labels on a docker-compose service.
# Everything else is discovered from container labels by the docker
# provider (see services' compose files for `traefik.http.*` labels).

http:
  routers:
    # netdata runs in network_mode: host — no container endpoint for the
    # docker provider to attach to. Route to host.docker.internal:19999.
    netdata:
      rule: "HostRegexp(`netdata.{x:.+}`)"
      entryPoints: [websecure]
      service: netdata
      tls: {}

    # Traefik's own dashboard + API, fronted by the proxy itself.
    # The second matcher (`spark{x:.+}` — anything starting with `spark`)
    # catches the bare tailnet Host header forwarded by the legacy `svc:spark`
    # VIP service (`spark.<tailnet>.ts.net`) so that still lands on the
    # dashboard. Once `svc:spark` is retired in favour of per-backend VIPs
    # (`svc:traefik` reaches the dashboard directly via `traefik.<tailnet>.ts.net`),
    # the fallback can be dropped.
    traefik:
      rule: "HostRegexp(`traefik.{x:.+}`) || HostRegexp(`spark{x:.+}`)"
      entryPoints: [websecure]
      service: api@internal
      tls: {}

  services:
    netdata:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:19999"
        passHostHeader: true
