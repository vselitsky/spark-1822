# Routes that can't be expressed as labels on a docker-compose service.
# Everything else is discovered from container labels by the docker
# provider (see services' compose files for `traefik.http.*` labels).

http:
  routers:
    # netdata runs in network_mode: host — no container endpoint for the
    # docker provider to attach to. Route to host.docker.internal:19999.
    netdata:
      rule: "HostRegexp(`netdata.spark{x:.+}`)"
      entryPoints: [websecure]
      service: netdata
      tls: {}

    # Traefik's own dashboard + API, fronted by the proxy itself.
    # The second matcher (`spark{x:.+}` — anything starting with `spark`)
    # is what catches the bare tailnet Host header Tailscale Serve forwards
    # (e.g. `spark-1822.<tailnet>.ts.net`). Lets `https://<node>.<tailnet>.ts.net/`
    # land on the dashboard. Only the dashboard router carries this fallback;
    # every other router stays pinned to its `<svc>.spark*` subdomain.
    traefik:
      rule: "HostRegexp(`traefik.spark{x:.+}`) || HostRegexp(`spark{x:.+}`)"
      entryPoints: [websecure]
      service: api@internal
      tls: {}

  services:
    netdata:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:19999"
        passHostHeader: true
