name: traefik

services:
  traefik:
    image: traefik:${TRAEFIK_TAG:?TRAEFIK_TAG must be set in .env}
    container_name: traefik
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - caddy
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/etc/traefik/certs:ro
      # Read-only access to the docker socket so the docker provider can
      # discover labelled services. Mount is :ro — Traefik only reads
      # container metadata, never controls them.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # LetsEncrypt state (acme.json: private keys + issued certs).
      # Uncomment + uncomment the matching block in traefik.yml when
      # this host gets a public DNS. Until then, the volume sits unused.
      # - traefik-acme:/etc/traefik/acme
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Joins the existing front-end network created and owned by the caddy
  # stack. Lets Traefik reach the same backends (vllm:8000, llama-cpp:8080,
  # ollama:11434, open-webui:8080) without any change to their compose
  # files. Traefik and Caddy can't both bind :80 / :443 at the same time
  # — start one or the other.
  caddy:
    external: true
    name: caddy

# Volume for LetsEncrypt state (acme.json). Held in a docker volume so
# the private keys never land on disk under /opt. Unused until the
# letsencrypt resolver in traefik.yml is uncommented.
# volumes:
#   traefik-acme:
#     name: traefik-acme
